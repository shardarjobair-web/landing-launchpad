<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Launchpad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="open-sans-normal">
    <header>
        <nav class="navbar">
            <h3 class="nav-tittle">LO<span class="text-primary">GO</span></h3>
            <ul>
                <li><button class="btn-primary">Sign Up</button></li>
            </ul>
        </nav>
        <div class="banner">
            <h1 class="banner-tittle">Cool Dark UI Template for <br> Webflow Agencies!</h1>
            <button class="btn-primary">Stay Focused</button>
        </div>
    </header>
    <main>
        <section class="action-section">
            <div class="action-container">
                <div class="action-content">
                    <h2 class="section-title">See it in Action</h2>
                    <p class="section-description">Explore the live preview and design your future with the best tools
                        available in the market today.</p>
                    <button class="btn-primary">Launch Live Preview</button>
                </div>
                <div class="action-img">
                    <img src="Assets/wc-mini.png" alt="Live Preview Image">
                </div>
            </div>
        </section>
        <section class="productive-section">
            <div class="stats-container">
                <h3 class="stats-title">Joined Thousands of Productive Users</h3>
                <div class="stats-flex">
                    <div class="stat-item">
                        <h2 class="stat-number">50K</h2>
                        <p class="stat-subtitle">Active Users</p>
                    </div>
                    <div class="stat-item">
                        <h2 class="stat-number">2M+</h2>
                        <p class="stat-subtitle">Focus Sessions</p>
                    </div>
                    <div class="stat-item">
                        <h2 class="stat-number">95%</h2>
                        <p class="stat-subtitle">Satisfaction Rate</p>
                    </div>
                </div>
            </div>
        </section>
        <section class="contact-section">
    <div class="contact-container">
        <div class="contact-title-box">
            <h2 class="section-title">Let's Get in <br> Touch</h2>
        </div>

        <div class="contact-form-box">
            <form action="#">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@gmail.com">
                </div>
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="btn-primary full-width">Get in Touch</button>
            </form>
        </div>
    </div>
</section>
    </main>

</body>

</html>
